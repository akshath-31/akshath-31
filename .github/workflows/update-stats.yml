name: Update GitHub Stats Card

on:
  schedule:
    - cron: "0 3 * * *"   # runs daily at 3 AM UTC
  workflow_dispatch:        # lets you trigger it manually from the Actions tab
  push:
    branches: [main]

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate stats card
        env:
          STATS_TOKEN: ${{ secrets.STATS_TOKEN }}
          GH_USERNAME: akshath-31
        run: python scripts/generate_stats.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Assets/stats.svg
          git diff --staged --quiet || git commit -m "Update stats card [automated]"
          git push
